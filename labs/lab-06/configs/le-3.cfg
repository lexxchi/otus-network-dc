le-3#sh run
! Command: show running-config
! device: le-3 (vEOS-lab, EOS-4.29.2F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
alias c configure terminal
alias ii show interfaces descr
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname le-3
!
spanning-tree mode mstp
!
vlan 10,20
!
vrf instance TENANT-1
!
interface Ethernet1
   description 3@sp-1
   mtu 8000
   no switchport
   ip address 10.2.1.5/31
   no ip ospf neighbor bfd
!
interface Ethernet2
   description 3@sp-2
   mtu 8000
   no switchport
   ip address 10.2.2.5/31
   no ip ospf neighbor bfd
!
interface Ethernet3
   description eth0@cl-3
   shutdown
   switchport access vlan 10
   no ip ospf neighbor bfd
!
interface Ethernet4
   description eth0@cl-4
   switchport access vlan 20
!
interface Ethernet5
   shutdown
!
interface Ethernet6
   shutdown
!
interface Ethernet7
   shutdown
!
interface Ethernet8
   shutdown
!
interface Loopback0
   ip address 10.0.1.3/32
!
interface Management1
!
interface Vlan20
   vrf TENANT-1
   ip address virtual 192.168.20.1/24
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vrf TENANT-1 vni 50000
!
ip virtual-router mac-address 00:00:be:ef:ca:fe
!
ip routing
ip routing vrf TENANT-1
!
router bgp 65103
   router-id 10.0.1.3
   timers bgp 3 9
   maximum-paths 4 ecmp 4
   neighbor SPINES peer group
   neighbor SPINES remote-as 65001
   neighbor SPINES bfd
   neighbor SPINES send-community extended
   neighbor 10.2.1.4 peer group SPINES
   neighbor 10.2.2.4 peer group SPINES
   !
   vlan 20
      rd 10.0.1.3:10020
      route-target both 20:10020
      redistribute learned
   !
   address-family evpn
      neighbor SPINES activate
   !
   address-family ipv4
      neighbor SPINES activate
      network 10.0.1.3/32
   !
   vrf TE
   !
   vrf TENANT-1
      rd 10.0.1.3:50000
      route-target import 50000:50000
      route-target export 50000:50000
      redistribute connected
!
end
le-3#