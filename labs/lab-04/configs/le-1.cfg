
le-1#sh run
! Command: show running-config
! device: le-1 (vEOS-lab, EOS-4.29.2F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
alias c configure terminal
alias ii show interfaces descr
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model ribd
!
hostname le-1
!
spanning-tree mode mstp
!
aaa authorization exec default local
!
interface Ethernet1
   description 1@sp-1
   mtu 8000
   no switchport
   ip address 10.2.1.1/31
!
interface Ethernet2
   description 1@sp-2
   mtu 8000
   no switchport
   ip address 10.2.2.1/31
!
interface Ethernet3
   description eth0@cl-1
   mtu 8000
!
interface Ethernet4
   shutdown
!
interface Ethernet5
   shutdown
!
interface Ethernet6
   shutdown
!
interface Ethernet7
   shutdown
!
interface Ethernet8
   shutdown
!
interface Loopback0
   ip address 10.0.1.1/32
!
interface Management1
!
ip routing
!
route-map 234frwe permit 10
!
peer-filter PF_LEAFS
   10 match as-range 65001-65109 result accept
!
router bgp 65101
   router-id 10.0.1.1
   timers bgp 3 9
   maximum-paths 4 ecmp 4
   bgp listen range 10.2.0.0/16 peer-group LEAFS peer-filter PF_LEAFS
   neighbor LEAFS peer group
   neighbor LEAFS bfd
   neighbor SPINES peer group
   neighbor SPINES remote-as 65001
   neighbor SPINES bfd
   neighbor 10.2.1.0 peer group SPINES
   neighbor 10.2.2.0 peer group SPINES
   !
   address-family ipv4
      neighbor LEAFS activate
      neighbor SPINES activate
      network 10.0.1.1/32
      redistribute connected
!
end
le-1#