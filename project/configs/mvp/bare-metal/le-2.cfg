
! Command: show running-config
! device: le-2 (vEOS-lab, EOS-4.29.2F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
alias c configure terminal
alias ii show interfaces descr
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname le-2
!
spanning-tree mode mstp
!
vlan 10,20
!
vlan 4094
   name MLAG-PEERLINK
   trunk group MLAG-PEERLINK
!
vrf instance MGMT
!
vrf instance TENANT-1
!
interface Port-Channel55
   description cl-1122
   switchport access vlan 20
   mlag 55
!
interface Port-Channel78
   description peer-link
   switchport mode trunk
   switchport trunk group MLAG-PEERLINK
   spanning-tree link-type point-to-point
!
interface Ethernet1
   description 2@sp-1
   mtu 8000
   no switchport
   ip address 10.2.1.3/31
!
interface Ethernet2
   description 2@sp-2
   mtu 8000
   no switchport
   ip address 10.2.2.3/31
!
interface Ethernet3
   description eth0@cl-2
   switchport access vlan 10
!
interface Ethernet4
   description eth0@cl-22
   switchport access vlan 20
!
interface Ethernet5
   description 1@cl-1122
   switchport access vlan 20
   channel-group 55 mode active
!
interface Ethernet6
   shutdown
!
interface Ethernet7
   description peer-link
   channel-group 78 mode active
!
interface Ethernet8
   description peer-link
   channel-group 78 mode active
!
interface Loopback0
   ip address 10.0.1.2/32
!
interface Management1
   vrf MGMT
   ip address 192.168.0.2/30
!
interface Vlan10
   vrf TENANT-1
   ip address virtual 192.168.10.1/24
!
interface Vlan20
   vrf TENANT-1
   ip address virtual 192.168.20.1/24
!
interface Vlan4094
   ip address 172.16.101.2/30
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vrf TENANT-1 vni 50000
!
ip virtual-router mac-address 00:00:be:ef:ca:fe
!
ip routing
ip routing vrf MGMT
ip routing vrf TENANT-1
!
mlag configuration
   domain-id LEAVES-1-2
   local-interface Vlan4094
   peer-address 172.16.101.1
   peer-address heartbeat 192.168.0.1 vrf MGMT
   peer-link Port-Channel78
!
router bgp 65102
   router-id 10.0.1.2
   timers bgp 3 9
   maximum-paths 4 ecmp 4
   neighbor SPINES peer group
   neighbor SPINES remote-as 65001
   neighbor SPINES bfd
   neighbor SPINES send-community extended
   neighbor 10.2.1.2 peer group SPINES
   neighbor 10.2.2.2 peer group SPINES
   !
   vlan 10
      rd 10.0.1.2:10010
      route-target both 10:10010
      redistribute learned
   !
   vlan 20
      rd 10.0.1.2:10020
      route-target both 20:10020
      redistribute learned
   !
   address-family evpn
      neighbor SPINES activate
   !
   address-family ipv4
      neighbor SPINES activate
      network 10.0.1.2/32
   !
   vrf TENANT-1
      rd 10.0.1.2:50000
      route-target import evpn 50000:50000
      route-target export evpn 50000:50000
      redistribute connected
!
end
le-2#