
sp-1#sh run
! Command: show running-config
! device: sp-1 (vEOS-lab, EOS-4.29.2F)
!
! boot system flash:/vEOS-lab.swi
!
no aaa root
!
alias c configure terminal
alias ii show interfaces descr
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname sp-1
!
spanning-tree mode mstp
!
interface Ethernet1
   description 1@le-1
   mtu 8000
   no switchport
   ip address 10.2.1.0/31
!
interface Ethernet2
   description 1@le-2
   mtu 8000
   no switchport
   ip address 10.2.1.2/31
!
interface Ethernet3
   description 1@le-3
   mtu 8000
   no switchport
   ip address 10.2.1.4/31
!
interface Ethernet4
   description 1@bl-1
   mtu 8000
   no switchport
   ip address 10.2.1.6/31
!
interface Ethernet5
   shutdown
!
interface Ethernet6
   shutdown
!
interface Ethernet7
   shutdown
!
interface Ethernet8
   shutdown
!
interface Loopback0
   ip address 10.0.1.0/32
!
interface Management1
!
ip routing
!
peer-filter PF_LEAFS
   10 match as-range 65101-65104 result accept
!
router bgp 65001
   router-id 10.0.1.0
   timers bgp 3 9
   maximum-paths 4 ecmp 4
   bgp listen range 10.2.0.0/16 peer-group LEAFS peer-filter PF_LEAFS
   neighbor LEAFS peer group
   neighbor LEAFS bfd
   neighbor LEAFS send-community extended
   !
   address-family evpn
      neighbor LEAFS activate
   !
   address-family ipv4
      neighbor LEAFS activate
      network 10.0.1.0/32
      redistribute connected
!
end
sp-1#